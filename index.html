    .nav-pill.active {

  <!-- Hero Section -->

          { en: "Banana Yogurt Smoothie", vi: "Chuối sữa chua", price: "40k" }, { en: "Passion Fruit Smoothie", vi: "Sinh tố Chanh leo", price: "40k" },

      {

        items: [
          { en: "White Tapioca Pearls", vi: "Trân châu trắng", price: "5k" }, { en: "Aloe Vera", vi: "Nha đam", price: "5k" },

    let isBilingual = true;
    let observer = null; // Khởi tạo biến observer toàn cục

    function toggleLang() {
      isBilingual = !isBilingual;
      renderUI();
    }

    function renderUI() {
      const heroBtn = document.getElementById('hero-btn');
      const heroDesc = document.getElementById('hero-desc');
      const heroSub = document.getElementById('hero-sub');

      if (isBilingual) {
        heroSub.innerText = 'HANOI • EST 2004';
        heroDesc.innerHTML = 'The meeting place of smiles.<br><span class="text-sm not-italic opacity-80 font-light italic">Điểm hẹn của những nụ cười.</span>';
        heroBtn.innerText = 'VIEW MENU';
      } else {
        heroSub.innerText = 'HÀ NỘI • SINCE 2004';
        heroDesc.innerText = 'Điểm hẹn của những nụ cười.';
        heroBtn.innerText = 'XEM THỰC ĐƠN';
      }

      const navContainer = document.getElementById('quick-nav');
      navContainer.innerHTML = menuData.map((sec, idx) => `
        <a href="#${sec.id}" class="nav-pill px-5 py-2.5 rounded-full border border-[#d4b99f] text-sm md:text-base font-medium hover:bg-[#f3ead8] ${idx === 0 ? 'active' : ''}">
          ${isBilingual ? `${sec.title_en} <span class="text-[11px] opacity-70 ml-1">(${sec.title_vi})</span>` : sec.title_vi}
        </a>
      `).join('');

      const menuRoot = document.getElementById('menu-root');
      menuRoot.innerHTML = menuData.map(sec => `
        <section id="${sec.id}" class="mb-16 scroll-mt-28 section-group">
          <h3 class="text-2xl md:text-3xl font-semibold mb-8 flex items-center gap-3 uppercase tracking-wide text-[#3f2a1e]">
            <span class="w-10 h-[2px] bg-[#d97706]"></span>
            ${sec.icon} ${isBilingual ? `${sec.title_en} <span class="text-sm md:text-base font-light text-gray-500 italic lowercase ml-2">/ ${sec.title_vi}</span>` : sec.title_vi}
          </h3>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5">
            ${sec.items.map(item => `
              <!-- Sửa lại Hover Effect ở đây: bỏ translate, thêm đổi viền và nền nhẹ nhàng -->
              <div class="menu-card p-5 rounded-2xl flex justify-between items-center shadow-sm hover:border-[#d97706]/40 hover:bg-[#fffcf8]">
                <div class="flex flex-col pr-3">
                    <span class="font-semibold text-gray-800 text-[15px] md:text-base leading-tight">
                        ${isBilingual ? item.en : item.vi}
                    </span>
                    ${isBilingual ? `<span class="text-[12px] text-[#d97706] italic font-normal mt-1 leading-tight">${item.vi}</span>` : ''}
                </div>
                <span class="text-[#d97706] font-bold text-lg md:text-xl whitespace-nowrap">${item.price}</span>
              </div>
            `).join('')}
          </div>
        </section>
      `).join('');

      const footerInfo = document.getElementById('footer-info');
      footerInfo.innerHTML = 
          `<p>📍 ${isBilingual ? 'Hanoi (Hà Nội)' : 'Hà Nội'}</p>
          <p>⏰ ${isBilingual ? '07:00 AM - 11:00 PM (07:00 - 23:00)' : '07:00 - 23:00'}</p>
          <p>📞 Hotline: 0933 556 650</p>`;

      // Gọi lại Intersection Observer sau khi DOM mới được vẽ
      initIntersectionObserver();
    }

    function initIntersectionObserver() {
      // Xóa bỏ listener cũ nếu người dùng vừa bấm đổi ngôn ngữ (chống leak memory)
      if (observer) {
        observer.disconnect();
      }

      const pills = document.querySelectorAll('.nav-pill');
      const sections = document.querySelectorAll('.section-group');
      
      // Sử dụng API IntersectionObserver hiện đại
      const options = {
        root: null,
        // Căn lề trên -80px để bù trừ cho thanh Sticky Nav
        rootMargin: "-80px 0px -70% 0px",
        threshold: 0
      };

      observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const currentId = entry.target.getAttribute('id');
            pills.forEach(pill => {
              pill.classList.remove('active');
              if (pill.getAttribute('href') === `#${currentId}`) {
                pill.classList.add('active');
                pill.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
              }
            });
          }
        });
      }, options);

      sections.forEach(section => {
        observer.observe(section);
      });
    }

    // Khởi chạy lần đầu
    renderUI();
  </script>
